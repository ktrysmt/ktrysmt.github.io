<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <title>{{ page.title }}</title>
  {% include og-image.html %}
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="alternate" type="application/rss+xml" title="{{ site.blogName }}" href="/feed.xml">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css">
</head>
<body>

  <section id="wrapper" class="{% if page.profile %}home{% endif %}">
  {% include navigation.html %}
    {{ content }}
  </section>

  <script defer src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/nginx.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/vim.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/toml.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/microlinkjs@latest/umd/microlink.min.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      document.querySelectorAll('pre code.language-mermaid').forEach(function(code) {
        var pre = code.parentElement;
        var div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = code.textContent;
        pre.parentElement.replaceChild(div, pre);
      });
      if (typeof mermaid !== 'undefined') {
        mermaid.initialize({ startOnLoad: false });
        mermaid.run().then(function() {
          document.querySelectorAll('.mermaid').forEach(function(el) {
            el.addEventListener('click', function() {
              var overlay = document.createElement('div');
              overlay.className = 'mermaid-modal-overlay';
              var content = document.createElement('div');
              content.className = 'mermaid-modal-content';
              content.innerHTML = el.innerHTML;
              var svg = content.querySelector('svg');
              if (svg) {
                var vb = svg.getAttribute('viewBox');
                if (vb) {
                  var w = parseFloat(vb.split(/\s+/)[2]);
                  svg.style.maxWidth = w + 'px';
                  svg.style.width = w + 'px';
                }
              }
              overlay.appendChild(content);
              document.body.appendChild(overlay);
              requestAnimationFrame(function() { overlay.classList.add('active'); });
              overlay.addEventListener('click', function(e) {
                if (e.target === overlay) {
                  overlay.classList.remove('active');
                  overlay.addEventListener('transitionend', function() { overlay.remove(); });
                }
              });
              document.addEventListener('keydown', function handler(e) {
                if (e.key === 'Escape') {
                  overlay.classList.remove('active');
                  overlay.addEventListener('transitionend', function() { overlay.remove(); });
                  document.removeEventListener('keydown', handler);
                }
              });
            });
          });
        });
      }
      hljs.registerAliases(['zsh'], { languageName: 'bash' });
      hljs.highlightAll();
      if (typeof microlink !== 'undefined') {
        microlink('.card-preview', { size: 'normal' });
      }
    });
  </script>

  <script async src="https://www.googletagmanager.com/gtag/js?id=UA-47087716-1"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'UA-47087716-1');
  </script>
</body>
</html>
